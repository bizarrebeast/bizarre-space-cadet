<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Bizarre Space Cadet</title>
<link href="https://fonts.googleapis.com/css2?family=Slackey&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'Slackey',cursive;touch-action:none;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
canvas{display:block;width:100vw;height:100vh}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, dpr;

function resize() {
  dpr = Math.min(window.devicePixelRatio || 1, 3);
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  initStars();
}
resize(); window.addEventListener('resize', resize);

// --- Constants ---
const COLORS = {red:'#ff4455',blue:'#4488ff',green:'#44dd66',yellow:'#ffdd33',purple:'#bb55ff',orange:'#ff8833',pink:'#ff77aa',cyan:'#44ddee'};
const COLOR_NAMES = Object.keys(COLORS);
const FUN_FACTS = [
  "Stars are like big sparkly lights!",
  "The Moon follows Earth everywhere!",
  "Rockets go WHOOOOSH really fast!",
  "Space is very quiet — shhh!",
  "Astronauts float like bubbles!",
  "Saturn has pretty rings!",
  "The Sun is a giant star!",
  "Mars is called the Red Planet!",
  "Jupiter is the biggest planet!",
  "Space goes on forever and ever!"
];
const CHEERS = ["Great job!", "Wow!", "You did it!", "Amazing!", "Yay!", "Super!", "Awesome!", "Woohoo!"];
const NEBULA_SETS = [['#1a0030','#001a33','#0a0020'],['#200020','#001030','#0a0a30'],['#002020','#100030','#000a20']];
let nebulaIdx = 0;

// --- State ---
let state = 'title'; // title, playing, flying, fact, finale
let round = 0, totalRounds = 10;
let planets = [], promptText = '', promptTarget = null, hintTimer = 0;
let rocket = {x: 0, y: 0, angle: -Math.PI/2, flame: 0};
let bgStars = [], particles = [], collectedStars = 0;
let cheerText = '', cheerTimer = 0, factText = '';
let flyProgress = 0, flyStartX, flyStartY, flyTargetX, flyTargetY;
let finaleTime = 0;

// --- Background stars ---
function initStars() {
  bgStars = [];
  for (let i = 0; i < 80; i++)
    bgStars.push({x: Math.random()*W, y: Math.random()*H, r: Math.random()*2+0.5, phase: Math.random()*Math.PI*2, speed: Math.random()*2+1});
}

function drawStars(t) {
  ctx.save();
  for (const s of bgStars) {
    ctx.globalAlpha = 0.4 + 0.6 * Math.abs(Math.sin(t * s.speed + s.phase));
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

function drawNebula() {
  const cols = NEBULA_SETS[nebulaIdx % NEBULA_SETS.length];
  const g = ctx.createRadialGradient(W*0.3, H*0.4, 0, W*0.5, H*0.5, Math.max(W,H)*0.8);
  g.addColorStop(0, cols[0]); g.addColorStop(0.5, cols[1]); g.addColorStop(1, cols[2]);
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
}

// --- Planet ---
function makePlanet(color, label, x, y) {
  return {
    color, hex: COLORS[color], label, x, y,
    r: Math.min(W, H) * 0.11,
    style: Math.random(), // 0-0.33 rings, 0.33-0.66 spots, else stripes
    bob: Math.random() * Math.PI * 2,
    wobble: 0, grow: 0
  };
}

function drawPlanet(p, t) {
  ctx.save();
  const bobY = Math.sin(t * 1.5 + p.bob) * 6;
  const cx = p.x, cy = p.y + bobY;
  const sc = 1 + p.grow * 0.3;
  const wobX = p.wobble > 0 ? Math.sin(p.wobble * 15) * 5 : 0;
  ctx.translate(cx + wobX, cy); ctx.scale(sc, sc);

  // shadow
  ctx.globalAlpha = 0.15; ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.ellipse(0, p.r * 0.9, p.r * 0.7, p.r * 0.12, 0, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1;

  // body gradient
  const g = ctx.createRadialGradient(-p.r*0.3, -p.r*0.3, p.r*0.1, 0, 0, p.r);
  g.addColorStop(0, lighten(p.hex, 50)); g.addColorStop(1, p.hex);
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(0, 0, p.r, 0, Math.PI*2); ctx.fill();

  // clip features to planet circle
  ctx.save(); ctx.beginPath(); ctx.arc(0, 0, p.r, 0, Math.PI*2); ctx.clip();
  if (p.style < 0.33) { // spots
    ctx.globalAlpha = 0.3; ctx.fillStyle = lighten(p.hex, 60);
    ctx.beginPath(); ctx.arc(-p.r*0.3, -p.r*0.15, p.r*0.22, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(p.r*0.25, p.r*0.25, p.r*0.15, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(p.r*0.1, -p.r*0.4, p.r*0.1, 0, Math.PI*2); ctx.fill();
  } else if (p.style < 0.66) { // stripes
    ctx.globalAlpha = 0.2; ctx.fillStyle = lighten(p.hex, 40);
    for (let i = -2; i <= 2; i++)
      ctx.fillRect(-p.r, i * p.r * 0.3 - p.r*0.05, p.r*2, p.r*0.1);
  }
  ctx.restore();

  // rings (drawn outside clip)
  if (p.style >= 0.66) {
    ctx.strokeStyle = lighten(p.hex, 70); ctx.lineWidth = 4; ctx.globalAlpha = 0.6;
    ctx.beginPath(); ctx.ellipse(0, 0, p.r*1.5, p.r*0.22, 0.15, 0, Math.PI*2); ctx.stroke();
    ctx.globalAlpha = 1;
  }

  // shine highlight
  ctx.globalAlpha = 0.25; ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-p.r*0.3, -p.r*0.3, p.r*0.18, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1;

  // label below planet
  const fs = Math.max(18, p.r * 0.5);
  drawTextOutline(p.label, 0, p.r + fs * 0.95, fs, '#fff', '#000');
  ctx.restore();
}

// --- Rocket ---
function drawRocket(x, y, angle, t) {
  ctx.save(); ctx.translate(x, y); ctx.rotate(angle + Math.PI/2);
  const s = Math.min(W, H) * 0.04;

  // flame
  if (state === 'flying' || state === 'title' || state === 'finale') {
    const fl = s * (1.2 + Math.sin(t * 20) * 0.4);
    const fg = ctx.createRadialGradient(0, s*1.2, 0, 0, s*1.2, fl);
    fg.addColorStop(0, '#ffee55'); fg.addColorStop(0.4, '#ff6622'); fg.addColorStop(1, 'rgba(255,50,0,0)');
    ctx.fillStyle = fg; ctx.beginPath(); ctx.arc(0, s*1.2, fl, 0, Math.PI*2); ctx.fill();
  }

  // body
  ctx.fillStyle = '#ddeeff';
  ctx.beginPath(); ctx.moveTo(0, -s*1.6);
  ctx.bezierCurveTo(s*0.7, -s*0.5, s*0.6, s*0.8, s*0.4, s*1.2);
  ctx.lineTo(-s*0.4, s*1.2);
  ctx.bezierCurveTo(-s*0.6, s*0.8, -s*0.7, -s*0.5, 0, -s*1.6);
  ctx.fill(); ctx.strokeStyle = '#8899aa'; ctx.lineWidth = 1.5; ctx.stroke();

  // window
  ctx.fillStyle = '#44ccff';
  ctx.beginPath(); ctx.arc(0, -s*0.3, s*0.3, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5; ctx.stroke();

  // nose cone
  ctx.fillStyle = '#ff4455';
  ctx.beginPath(); ctx.moveTo(0, -s*1.6);
  ctx.quadraticCurveTo(s*0.25, -s*1.2, 0, -s*1.0);
  ctx.quadraticCurveTo(-s*0.25, -s*1.2, 0, -s*1.6);
  ctx.fill();

  // fins
  ctx.fillStyle = '#ff4455';
  ctx.beginPath(); ctx.moveTo(s*0.4, s*0.6); ctx.lineTo(s*0.9, s*1.3); ctx.lineTo(s*0.3, s*1.2); ctx.fill();
  ctx.beginPath(); ctx.moveTo(-s*0.4, s*0.6); ctx.lineTo(-s*0.9, s*1.3); ctx.lineTo(-s*0.3, s*1.2); ctx.fill();
  ctx.restore();
}

// --- Particles ---
function spawnParticles(x, y, n, color) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2, sp = Math.random() * 3 + 1;
    particles.push({
      x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp,
      r: Math.random()*4+2, life: 1,
      color: color || `hsl(${Math.random()*360},100%,70%)`,
      decay: 0.01 + Math.random() * 0.015
    });
  }
}
function updateParticles() { particles = particles.filter(p => { p.x += p.vx; p.y += p.vy; p.life -= p.decay; return p.life > 0; }); }
function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// --- Collected stars ---
function drawCollectedStars() {
  if (collectedStars === 0) return;
  const sz = Math.min(W, H) * 0.03;
  const totalW = collectedStars * sz * 2.2;
  const startX = W/2 - totalW/2 + sz;
  for (let i = 0; i < collectedStars; i++)
    drawStar5(startX + i * sz * 2.2, sz * 1.8, sz, '#ffdd44');
}

function drawStar5(cx, cy, r, color) {
  ctx.fillStyle = color; ctx.beginPath();
  for (let i = 0; i < 5; i++) {
    const a = Math.PI * 2 * i / 5 - Math.PI / 2;
    ctx.lineTo(cx + Math.cos(a) * r, cy + Math.sin(a) * r);
    const b = a + Math.PI / 5;
    ctx.lineTo(cx + Math.cos(b) * r * 0.4, cy + Math.sin(b) * r * 0.4);
  }
  ctx.closePath(); ctx.fill();
}

// --- Round setup ---
function setupRound() {
  let numPlanets, promptType;
  if (round < 3)      { numPlanets = 2; promptType = 'color'; }
  else if (round < 6) { numPlanets = 2; promptType = 'number'; }
  else if (round < 8) { numPlanets = 3; promptType = 'color'; }
  else                 { numPlanets = 3; promptType = Math.random() < 0.5 ? 'color' : 'number'; }

  const used = []; planets = [];
  const pos = numPlanets === 2
    ? [{x: W*0.3, y: H*0.33}, {x: W*0.7, y: H*0.33}]
    : [{x: W*0.2, y: H*0.30}, {x: W*0.5, y: H*0.24}, {x: W*0.8, y: H*0.30}];

  for (let i = 0; i < numPlanets; i++) {
    let c; do { c = COLOR_NAMES[Math.floor(Math.random() * COLOR_NAMES.length)]; } while (used.includes(c));
    used.push(c);
    const label = promptType === 'color' ? c.toUpperCase() : '' + (i + 1);
    planets.push(makePlanet(c, label, pos[i].x, pos[i].y));
  }

  const ti = Math.floor(Math.random() * numPlanets);
  promptTarget = ti;
  promptText = promptType === 'color'
    ? 'Fly to the ' + planets[ti].color.toUpperCase() + ' planet!'
    : 'Fly to planet ' + (ti + 1) + '!';
  hintTimer = 0;
  rocket.x = W / 2; rocket.y = H * 0.82; rocket.angle = -Math.PI / 2;
  state = 'playing';
}

// --- Input ---
canvas.addEventListener('pointerdown', e => {
  const x = e.clientX, y = e.clientY;
  if (state === 'title') { round = 0; collectedStars = 0; nebulaIdx = Math.floor(Math.random()*3); setupRound(); return; }
  if (state === 'finale') { round = 0; collectedStars = 0; state = 'title'; return; }
  if (state === 'fact') { nextRound(); return; }
  if (state !== 'playing') return;

  for (let i = 0; i < planets.length; i++) {
    const p = planets[i];
    const bobY = Math.sin(performance.now()/1000 * 1.5 + p.bob) * 6;
    const dx = x - p.x, dy = y - (p.y + bobY);
    if (Math.sqrt(dx*dx + dy*dy) < p.r * 1.5) {
      if (i === promptTarget) {
        flyStartX = rocket.x; flyStartY = rocket.y;
        flyTargetX = p.x; flyTargetY = p.y;
        flyProgress = 0; state = 'flying';
        cheerText = CHEERS[Math.floor(Math.random() * CHEERS.length)];
        cheerTimer = 1;
      } else {
        p.wobble = 1;
      }
      return;
    }
  }
});

function nextRound() {
  round++;
  if (round >= totalRounds) { state = 'finale'; finaleTime = 0; return; }
  nebulaIdx++; setupRound();
}

// --- Helpers ---
function lighten(hex, amt) {
  let r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return '#' + [Math.min(255,r+amt), Math.min(255,g+amt), Math.min(255,b+amt)].map(v => v.toString(16).padStart(2,'0')).join('');
}

function drawTextOutline(text, x, y, size, fill, stroke) {
  ctx.font = size + 'px Slackey'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.lineJoin = 'round'; ctx.strokeStyle = stroke || '#000'; ctx.lineWidth = Math.max(3, size * 0.1);
  ctx.strokeText(text, x, y); ctx.fillStyle = fill; ctx.fillText(text, x, y);
}

function wrapText(text, maxW) {
  const words = text.split(' '); let lines = [], line = '';
  for (const w of words) {
    const test = line ? line + ' ' + w : w;
    if (ctx.measureText(test).width > maxW && line) { lines.push(line); line = w; }
    else line = test;
  }
  if (line) lines.push(line); return lines;
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath(); ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y); ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r); ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h); ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r); ctx.quadraticCurveTo(x, y, x+r, y);
}

// --- Scene renderers ---
function drawTitle(t) {
  const bounce = Math.sin(t * 2) * 8;
  drawTextOutline('BIZARRE', W/2, H*0.20 + bounce, Math.min(W*0.12, 54), '#ff77aa', '#000');
  drawTextOutline('SPACE CADET', W/2, H*0.30 + bounce, Math.min(W*0.10, 46), '#44ddee', '#000');
  drawRocket(W/2, H*0.52 + Math.sin(t*1.5)*15, -Math.PI/2, t);
  ctx.globalAlpha = 0.5 + 0.5 * Math.sin(t * 3);
  drawTextOutline('Tap to Play!', W/2, H*0.80, Math.min(W*0.08, 34), '#ffdd44', '#000');
  ctx.globalAlpha = 1;
}

function drawPlaying(t, dt) {
  for (const p of planets) {
    if (p.wobble > 0) p.wobble = Math.max(0, p.wobble - dt * 3);
    if (p.grow > 0) p.grow = Math.max(0, p.grow - dt * 2);
    drawPlanet(p, t);
  }
  // hint ring after 4s
  hintTimer += dt;
  if (hintTimer > 4 && promptTarget !== null) {
    const p = planets[promptTarget];
    const bobY = Math.sin(t * 1.5 + p.bob) * 6;
    ctx.save(); ctx.strokeStyle = '#ffdd44'; ctx.lineWidth = 3; ctx.setLineDash([8, 6]);
    ctx.globalAlpha = 0.5 + 0.5 * Math.sin(t * 4);
    ctx.beginPath(); ctx.arc(p.x, p.y + bobY, p.r * 1.35, 0, Math.PI*2); ctx.stroke();
    ctx.setLineDash([]); ctx.restore();
  }
  drawRocket(rocket.x, rocket.y, rocket.angle, t);

  // prompt text
  const ps = Math.min(W * 0.06, 28);
  ctx.font = ps + 'px Slackey';
  const lines = wrapText(promptText, W * 0.85);
  for (let i = 0; i < lines.length; i++)
    drawTextOutline(lines[i], W/2, H*0.62 + i * ps * 1.4, ps, '#fff', '#000');
  drawCollectedStars();
}

function drawFlying(t, dt) {
  flyProgress += dt * 1.3;
  const p = Math.min(1, flyProgress);
  const ease = p < 0.5 ? 2*p*p : 1 - Math.pow(-2*p + 2, 2) / 2;
  rocket.x = flyStartX + (flyTargetX - flyStartX) * ease;
  rocket.y = flyStartY + (flyTargetY - flyStartY) * ease;
  rocket.angle = Math.atan2(flyTargetY - flyStartY, flyTargetX - flyStartX) - Math.PI/2;

  if (Math.random() < 0.5) spawnParticles(rocket.x, rocket.y + 10, 1, '#ff8833');
  for (const pl of planets) drawPlanet(pl, t);
  drawRocket(rocket.x, rocket.y, rocket.angle, t);

  if (cheerTimer > 0) {
    ctx.globalAlpha = cheerTimer;
    drawTextOutline(cheerText, W/2, H*0.58, Math.min(W*0.1, 44), '#ffdd44', '#000');
    ctx.globalAlpha = 1; cheerTimer -= dt * 0.7;
  }

  if (p >= 1) {
    const tp = planets[promptTarget]; tp.grow = 1;
    spawnParticles(tp.x, tp.y, 30);
    collectedStars++;
    factText = FUN_FACTS[round % FUN_FACTS.length];
    state = 'fact';
  }
  drawCollectedStars();
}

function drawFact(t) {
  for (const p of planets) {
    if (p.grow > 0) p.grow = Math.max(0, p.grow - 0.008);
    drawPlanet(p, t);
  }
  drawRocket(rocket.x, rocket.y, rocket.angle, t);

  // fact bubble
  const bw = W * 0.88, bh = H * 0.17;
  const bx = W/2 - bw/2, by = H * 0.50;
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  roundRect(bx, by, bw, bh, 18); ctx.fill();
  ctx.strokeStyle = '#44ddee'; ctx.lineWidth = 2.5;
  roundRect(bx, by, bw, bh, 18); ctx.stroke();

  const fs = Math.min(W * 0.048, 21);
  ctx.font = fs + 'px Slackey';
  const lines = wrapText(factText, bw - 30);
  for (let i = 0; i < lines.length; i++)
    drawTextOutline(lines[i], W/2, by + bh/2 + (i - (lines.length-1)/2) * fs * 1.3, fs, '#fff', '#000');

  ctx.globalAlpha = 0.4 + 0.6 * Math.abs(Math.sin(t * 3));
  drawTextOutline('Tap to continue', W/2, H * 0.78, Math.min(W*0.05, 20), '#aaddff', '#000');
  ctx.globalAlpha = 1;
  drawCollectedStars();
}

function drawFinale(t, dt) {
  finaleTime += dt;
  drawTextOutline("You're a", W/2, H*0.17, Math.min(W*0.09, 40), '#ff77aa', '#000');
  drawTextOutline('Space Cadet!', W/2, H*0.27, Math.min(W*0.12, 52), '#44ddee', '#000');

  // loop-de-loop
  const lr = Math.min(W, H) * 0.15;
  const la = finaleTime * 2.5;
  const rx = W/2 + Math.cos(la) * lr;
  const ry = H * 0.50 + Math.sin(la * 2) * lr * 0.5;
  const ra = Math.atan2(Math.cos(la*2) * lr * 2, -Math.sin(la) * lr);
  drawRocket(rx, ry, ra, t);
  if (Math.random() < 0.35) spawnParticles(rx, ry, 1);
  if (Math.random() < 0.12) spawnParticles(Math.random()*W, Math.random()*H, 2, '#ffdd44');

  drawCollectedStars();
  ctx.globalAlpha = 0.4 + 0.6 * Math.abs(Math.sin(t * 3));
  drawTextOutline('Tap to Play Again!', W/2, H*0.85, Math.min(W*0.07, 30), '#ffdd44', '#000');
  ctx.globalAlpha = 1;
}

// --- Main loop ---
let lastTime = 0;
function loop(ts) {
  const t = ts / 1000;
  const dt = Math.min(0.05, lastTime ? t - lastTime : 0.016);
  lastTime = t;
  ctx.clearRect(0, 0, W, H);
  drawNebula(); drawStars(t);

  if (state === 'title') drawTitle(t);
  else if (state === 'playing') drawPlaying(t, dt);
  else if (state === 'flying') drawFlying(t, dt);
  else if (state === 'fact') drawFact(t);
  else if (state === 'finale') drawFinale(t, dt);

  updateParticles(); drawParticles();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
